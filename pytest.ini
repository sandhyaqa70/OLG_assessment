[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --html=reports/report.html
    --self-contained-html
markers =
    part1: Part 1 - Basic Assertions tests
    part2: Part 2 - Restaurant Search tests
    smoke: Smoke tests
    regression: Regression tests
timeout = 60
